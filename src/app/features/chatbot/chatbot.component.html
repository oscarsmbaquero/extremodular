  <div class="fixed bottom-8 right-8 z-[100]">
      <!-- Chat Toggle Button -->
      <button 
        (click)="toggleChat()"
        class="w-16 h-16 bg-primary text-on-primary rounded-full shadow-ambient-lg flex items-center justify-center transition-all duration-500 hover:scale-110 active:scale-95 group">
        <span class="material-icons text-3xl transition-transform duration-500" [class.rotate-180]="isOpen()">
          {{ isOpen() ? 'close' : 'chat' }}
        </span>
        <div class="absolute -top-1 -right-1 w-4 h-4 bg-secondary-container rounded-full border-2 border-primary animate-pulse"></div>
      </button>

      <!-- Chat Window -->
      @if (isOpen()) {
        <div class="absolute bottom-24 right-0 w-[380px] h-[520px] glass-panel rounded-lg shadow-ambient-lg flex flex-col overflow-hidden border border-white/30 animate-in slide-in-from-bottom-8 duration-500">
          <!-- Header -->
          <div class="bg-primary p-6 text-surface">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                  <span class="material-icons text-secondary-container">smart_toy</span>
                </div>
                <div>
                  <h3 class="text-lg font-bold tracking-tight">Asistente Virtual</h3>
                  <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">En línea</span>
                  </div>
                </div>
              </div>
              <button (click)="toggleChat()" class="text-surface/60 hover:text-surface transition-colors">
                <span class="material-icons">close</span>
              </button>
            </div>
          </div>

          <!-- Messages -->
          <div #scrollContainer class="flex-1 overflow-y-auto p-6 space-y-6 bg-surface-container-low/50">
            @for (msg of messages(); track $index) {
              <div class="flex flex-col" [class.items-end]="msg.role === 'user'">
                <div 
                  [class.bg-primary]="msg.role === 'user'"
                  [class.text-on-primary]="msg.role === 'user'"
                  [class.bg-surface-container-lowest]="msg.role === 'model'"
                  [class.text-on-surface]="msg.role === 'model'"
                  [class.shadow-ambient]="msg.role === 'model'"
                  [class.rounded-tr-none]="msg.role === 'user'"
                  [class.rounded-tl-none]="msg.role === 'model'"
                  class="max-w-[85%] p-4 rounded-lg text-sm font-light leading-relaxed">
                  {{ msg.text }}
                </div>
                <span class="text-[9px] font-bold uppercase tracking-widest text-primary/30 mt-2">
                  {{ msg.role === 'user' ? 'Tú' : 'Extremodular AI' }}
                </span>
              </div>
            }
            @if (isLoading()) {
              <div class="flex gap-2 p-4 bg-surface-container-lowest rounded-lg rounded-tl-none w-16 shadow-ambient">
                <div class="w-1.5 h-1.5 bg-primary/20 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-primary/20 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                <div class="w-1.5 h-1.5 bg-primary/20 rounded-full animate-bounce [animation-delay:0.4s]"></div>
              </div>
            }
          </div>

          <!-- Input -->
          <div class="p-6 bg-surface-container-lowest border-t border-primary/5">
            <form (submit)="sendMessage(); $event.preventDefault()" class="flex gap-3">
              <input 
                type="text" 
                [ngModel]="userInput()"
                (ngModelChange)="userInput.set($event)"
                name="userInput"
                placeholder="Escribe tu duda aquí..."
                [disabled]="isLoading()"
                class="flex-1 bg-surface-container-low border-none rounded-md px-4 py-3 text-sm focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-primary/30">
              <button 
                type="submit" 
                [disabled]="!userInput().trim() || isLoading()"
                class="w-12 h-12 bg-primary text-on-primary rounded-md flex items-center justify-center disabled:opacity-30 transition-all hover:opacity-90 active:scale-95">
                <span class="material-icons">send</span>
              </button>
            </form>
          </div>
        </div>
      }
    </div>
