<div class="min-h-screen bg-surface text-on-surface font-sans flex flex-col">
  <app-header></app-header>
  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>
  <app-chatbot></app-chatbot>
  <app-footer></app-footer>
   <!-- Scroll to top -->
  @if (showScrollTop()) {
    <button
      (click)="scrollToTop()"
      class="fixed bottom-8 right-4 w-12 h-12 bg-primary text-on-primary rounded-full shadow-ambient-lg flex items-center justify-center border border-white/70 hover:scale-110 active:scale-95 transition-all duration-300 z-50">
      <span class="material-icons text-lg">arrow_upward</span>
    </button>
  }
</div>
