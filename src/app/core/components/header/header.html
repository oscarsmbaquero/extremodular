<header class="fixed top-0 left-0 right-0 z-50 flex justify-center px-4 mt-2">
  <div class="glass-panel w-full max-w-5xl rounded-full border border-outline-variant/20 shadow-ambient px-3 h-14 flex items-center justify-between">
    
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3 pl-1 group">
      <img src="logo_extremodular_green.png" alt="Logo Extremodular" class="h-9 w-auto rounded-sm transition-transform group-hover:scale-105">
      <span class="font-display font-bold text-lg tracking-tight text-primary leading-none">Extremodular</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden sm:flex items-center gap-1">
      <a routerLink="/" routerLinkActive="text-primary bg-surface-container" [routerLinkActiveOptions]="{exact: true}"
         class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-all">Inicio</a>
      <a routerLink="/models" routerLinkActive="text-primary bg-surface-container"
         class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-all">Catálogo</a>
      <a routerLink="/configurator" routerLinkActive="text-primary bg-surface-container"
         class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-all">Configurador</a>
      <a routerLink="/custom" routerLinkActive="text-primary bg-surface-container"
         class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-all">A Medida</a>
      <a routerLink="/process" routerLinkActive="text-primary bg-surface-container"
         class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-all">Proceso</a>
      <a routerLink="/about" routerLinkActive="text-primary bg-surface-container"
         class="text-on-surface-variant hover:text-primary hover:bg-surface-container-low px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-all">Nosotros</a>
      <a routerLink="/contact"
         class="btn-primary !py-2 !px-5 !rounded-full text-xs ml-2">Contacto</a>
    </nav>

    <!-- Hamburger -->
    <button (click)="toggleMenu()" class="sm:hidden p-2 rounded-full text-on-surface-variant hover:text-primary hover:bg-surface-container-low" aria-label="Menu principal">
      @if (menuOpen()) {
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6L6 18"></path>
          <path d="M6 6L18 18"></path>
        </svg>
      } @else {
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 17h16"></path>
        </svg>
      }
    </button>
  </div>

  <!-- Mobile Dropdown -->
  @if (menuOpen()) {
    <div class="sm:hidden absolute top-20 left-4 right-4 bg-surface/95 backdrop-blur-xl rounded-2xl border border-outline-variant/15 shadow-ambient-lg animate-in slide-in-from-top duration-300">
      <div class="px-3 py-3 space-y-1">
        <a routerLink="/" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" [routerLinkActiveOptions]="{exact: true}" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Inicio</a>
        <a routerLink="/models" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Catálogo</a>
        <a routerLink="/configurator" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Configurador</a>
        <a routerLink="/custom" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">A Medida</a>
        <a routerLink="/process" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Proceso</a>
        <a routerLink="/about" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Nosotros</a>
        <a routerLink="/contact" (click)="closeMenu()" class="block px-4 py-3 rounded-xl text-sm font-medium uppercase tracking-widest text-on-primary bg-primary hover:opacity-90 transition-all text-center mt-2">Contacto</a>
      </div>
    </div>
  }
</header>
