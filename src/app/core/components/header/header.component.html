<header class="glass-panel border-b border-outline-variant/10 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20">
      <div class="flex items-center justify-between w-full sm:w-auto">
        <a routerLink="/" class="flex-shrink-0 flex items-end gap-4 group">
          <img src="logo_extremodular_green.png" alt="Logo Extremodular" class="h-14 w-auto rounded-sm transition-transform group-hover:scale-105">
          <span class="text-3xl font-display font-extrabold tracking-tighter text-primary leading-none">Extremodular</span>
        </a>
        <!-- Hamburger Button -->
        <button 
          (click)="toggleMenu()"
          class="sm:hidden p-2 rounded-md text-on-surface-variant hover:text-primary hover:bg-surface-container-low focus:outline-none"
          aria-label="Menu principal">
          <span class="material-icons">{{ menuOpen() ? 'close' : 'menu' }}</span>
        </button>
      </div>
      <!-- Desktop Navigation -->
      <nav class="hidden sm:ml-12 sm:flex sm:space-x-8">
        <a routerLink="/" routerLinkActive="text-primary font-semibold" [routerLinkActiveOptions]="{exact: true}" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">Inicio</a>
        <a routerLink="/models" routerLinkActive="text-primary font-semibold" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">Catálogo</a>
        <a routerLink="/configurator" routerLinkActive="text-primary font-semibold" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">Configurador</a>
        <a routerLink="/custom" routerLinkActive="text-primary font-semibold" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">A Medida</a>
        <a routerLink="/process" routerLinkActive="text-primary font-semibold" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">Proceso</a>
        <a routerLink="/about" routerLinkActive="text-primary font-semibold" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">Nosotros</a>
        <a routerLink="/contact" routerLinkActive="text-primary font-semibold" class="text-on-surface-variant hover:text-primary inline-flex items-center px-1 pt-1 text-xs font-bold uppercase tracking-widest transition-colors">Contacto</a>
      </nav>
    </div>
  </div>
  <!-- Mobile Navigation Dropdown -->
  @if (menuOpen()) {
    <div class="sm:hidden bg-surface/95 backdrop-blur-xl border-b border-outline-variant/10 shadow-ambient-lg animate-in slide-in-from-top duration-300">
      <div class="px-4 pt-4 pb-6 space-y-2">
        <a routerLink="/" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" [routerLinkActiveOptions]="{exact: true}" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Inicio</a>
        <a routerLink="/models" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Catálogo</a>
        <a routerLink="/configurator" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Configurador</a>
        <a routerLink="/custom" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">A Medida</a>
        <a routerLink="/process" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Proceso</a>
        <a routerLink="/about" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Nosotros</a>
        <a routerLink="/contact" (click)="closeMenu()" routerLinkActive="bg-secondary-container text-primary" class="block px-4 py-3 rounded-md text-sm font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-all">Contacto</a>
      </div>
    </div>
  }
</header>
